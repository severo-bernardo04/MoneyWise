spring.application.name=moneywise

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:MoneyWiseDB}
spring.datasource.username=${DB_USER:moneywise_user}
spring.datasource.password=${DB_PASSWORD:moneywise_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT:8080}

jwt.secret=${JWT_SECRET:41432D4A614E645267556B58703273357638792F423F4528482B4D6251655468}
jwt.expiration=86400000

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs